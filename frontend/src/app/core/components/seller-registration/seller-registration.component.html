<div class="register-page">
  <div class="register-container">
    <div class="register-header">
      <div class="header-left">
        <span class="icon">☰</span>
        <h2>New Seller</h2>
        <span class="badge">Not Saved</span>
      </div>
      <div class="header-right">
        <button type="submit" (click)="onSubmit()" [disabled]="loading" class="btn-save">Save</button>
      </div>
    </div>

    <div class="register-tabs">
      <div class="tab-item active">User Details</div>
    </div>

    <div class="register-form-body">
      <div class="enabled-toggle">
        <input type="checkbox" checked disabled id="enabled">
        <label for="enabled">Enabled</label>
      </div>

      <div class="section-card">
        <h3>Seller Account Info</h3>
        
        <form [formGroup]="sellerForm">
          <div class="erp-grid">
            <!-- Column 1 -->
            <div class="erp-col">
              <div class="erp-form-group">
                <label>Email *</label>
                <input type="email" formControlName="email">
                <span class="error-hint" *ngIf="sellerForm.get('email')?.invalid && sellerForm.get('email')?.touched">Invalid email</span>
              </div>
              <div class="erp-form-group">
                <label>Mobile Number *</label>
                <input type="tel" formControlName="mobile">
              </div>
              <div class="erp-form-group">
                <label>First Name *</label>
                <input type="text" formControlName="first_name">
              </div>
              <div class="erp-form-group">
                <label>Middle Name</label>
                <input type="text" formControlName="middle_name">
              </div>
              <div class="erp-form-group">
                <label>Last Name *</label>
                <input type="text" formControlName="last_name">
              </div>
            </div>

            <!-- Column 2 -->
            <div class="erp-col">
              <div class="erp-form-group">
                <label>Username</label>
                <input type="text" formControlName="username">
              </div>
              <div class="erp-form-group">
                <label>Supplier/Business Name (Optional)</label>
                <input type="text" formControlName="supplier_name" placeholder="Leave blank to use full name">
              </div>
            </div>

            <!-- Column 3 -->
            <div class="erp-col">
              <div class="erp-form-group">
                <label>Language</label>
                <input type="text" formControlName="language">
              </div>

              <div class="erp-check-group">
                <input type="checkbox" formControlName="send_welcome_email" id="welcome">
                <label for="welcome">Send Welcome Email</label>
              </div>
            </div>
          </div>

          <div class="section-divider"></div>

          <div class="erp-grid">
            <div class="erp-col">
              <div class="erp-form-group">
                <label>Password *</label>
                <input type="password" formControlName="password">
              </div>
            </div>
            <div class="erp-col">
              <div class="erp-form-group">
                <label>Confirm Password *</label>
                <input type="password" formControlName="confirmPassword">
                <p *ngIf="sellerForm.hasError('mismatch') && sellerForm.get('confirmPassword')?.touched" class="error-hint">Passwords do not match</p>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div *ngIf="errorMessage" class="error-alert">
      {{ errorMessage }}
    </div>

    <div class="footer-login">
      Already have a seller account? <a [routerLink]="['/login']">Sign In</a>
    </div>
  </div>
</div>
