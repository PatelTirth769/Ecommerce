<section class="w-full flex-1 space-y-8 py-4">

    <!-- Main Carousel Section -->
    <div class="rounded-3xl overflow-hidden shadow-xl">
        <app-carousel [slideImages]="images"></app-carousel>
    </div>

    <!-- Product Section -->
    <article class="space-y-8">
        <div class="flex items-center justify-between border-b border-gray-100 dark:border-gray-800 pb-4">
            <h3 class="text-2xl font-black text-gray-900 dark:text-white tracking-tight">New Arrivals</h3>
            <a href="#" class="text-sm font-bold text-blue-600 hover:text-blue-700 dark:text-blue-400">View All</a>
        </div>

        <!-- Error State -->
        <div class="flex justify-center items-center h-[40vh]" *ngIf="error && isLoading">
            <div class="text-red-500 flex flex-col justify-center items-center space-y-4">
                <div class="p-6 bg-red-50 dark:bg-red-900/10 rounded-full">
                    <i class="fa-solid fa-circle-exclamation text-6xl"></i>
                </div>
                <div class="text-center">
                    <h4 class="text-xl font-bold">Connection Failed</h4>
                    <p class="text-sm opacity-70">Unable to fetch products. Please try again later.</p>
                </div>
            </div>
        </div>

        <!-- Loading Skeletons -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6" *ngIf="!error && isLoading">
            <app-cardskeleton *ngFor="let skeleton of skeletons"></app-cardskeleton>
        </div>

        <!-- Product Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6" *ngIf="!isLoading && products.length > 0">
            <div *ngFor="let product of products" class="group relative flex flex-col w-full bg-white dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700 shadow-sm hover:shadow-2xl transition-all duration-500 overflow-hidden">
                
                <!-- Wishlist Button (Floating) -->
                <button class="absolute top-4 right-4 z-10 w-10 h-10 flex items-center justify-center rounded-full bg-white/80 dark:bg-gray-900/80 backdrop-blur-md text-gray-400 hover:text-red-500 shadow-sm transition-all transform scale-0 group-hover:scale-100 duration-300">
                    <i class="fa-regular fa-heart"></i>
                </button>

                <!-- Product Image Container -->
                <a [routerLink]="['categories','product',product.id]" class="relative w-full aspect-square overflow-hidden bg-gray-50 dark:bg-gray-700">
                    <img 
                        class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                        [src]="product.images[0]" 
                        [alt]="product.title"
                        onerror="this.src='assets/images/logo.png'" />
                    
                    <!-- Stock Badge Overlay -->
                    <div class="absolute bottom-3 left-3">
                        <span [class]="product.stock == 'In stock' ? 'bg-green-500' : 'bg-orange-500'" class="text-[10px] font-black text-white px-3 py-1 rounded-full uppercase tracking-wider shadow-lg">
                            {{product.stock}}
                        </span>
                    </div>
                </a>
                
                <!-- Product Content -->
                <div class="flex flex-col p-5 flex-grow space-y-3">
                    <div class="space-y-1">
                        <span class="text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-widest">
                            {{product.category || 'Product'}}
                        </span>
                        <a [routerLink]="['categories','product',product.id]">
                            <h5 class="text-sm font-bold text-gray-900 dark:text-white line-clamp-2 leading-snug group-hover:text-blue-600 transition-colors">
                                {{product.title}}
                            </h5>
                        </a>
                    </div>
                    
                    <div class="flex items-end justify-between mt-auto">
                        <div class="flex flex-col">
                            <span class="text-xs text-gray-400 dark:text-gray-500 line-through" *ngIf="product.prevprice > 0">&#8377;{{product.prevprice}}</span>
                            <span class="text-lg font-black text-gray-900 dark:text-white">&#8377;{{product.price}}</span>
                        </div>
                    </div>

                    <div class="pt-2">
                        <ng-container *ngIf="product.stock == 'In stock'; else unavailable">
                            <button 
                                *ngIf="!isProductInCart(product)"
                                (click)="addToCart(product)"
                                class="w-full py-3 bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-xs font-bold rounded-xl hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-all duration-300 flex items-center justify-center gap-2"
                            >
                                <i class="fa-solid fa-bag-shopping"></i>
                                Add to Cart
                            </button>
                            <button 
                                *ngIf="isProductInCart(product)"
                                (click)="removeFromCart(product)"
                                class="w-full py-3 bg-red-50 text-red-600 text-xs font-bold rounded-xl hover:bg-red-600 hover:text-white transition-all duration-300 flex items-center justify-center gap-2"
                            >
                                <i class="fa-solid fa-trash"></i>
                                Remove
                            </button>
                        </ng-container>
                        <ng-template #unavailable>
                            <div class="w-full py-3 bg-gray-100 dark:bg-gray-700 text-gray-400 dark:text-gray-500 text-[10px] font-bold text-center rounded-xl uppercase tracking-widest">
                                Coming Soon
                            </div>
                        </ng-template>
                    </div>
                </div>
            </div>
        </div>
    </article>
</section>
