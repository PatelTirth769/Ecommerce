<div class="toast-container">
  <div *ngFor="let toast of toasts" 
       [class.toast-fadeOut]="toast.fadingOut"
       class="toast-item group flex items-center p-4 mb-4 w-full max-w-xs text-gray-500 bg-white rounded-xl shadow-2xl border border-gray-100 backdrop-blur-md bg-opacity-90 transition-all duration-300 hover:scale-105"
       role="alert">
    
    <!-- Success Icon -->
    <div *ngIf="toast.type === 'success'" class="inline-flex items-center justify-center flex-shrink-0 w-10 h-10 text-green-500 bg-green-50 rounded-lg group-hover:bg-green-100 transition-colors">
      <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/>
      </svg>
      <span class="sr-only">Check icon</span>
    </div>

    <!-- Error Icon -->
    <div *ngIf="toast.type === 'error'" class="inline-flex items-center justify-center flex-shrink-0 w-10 h-10 text-red-500 bg-red-50 rounded-lg group-hover:bg-red-100 transition-colors">
      <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 11.793a1 1 0 1 1-1.414 1.414L10 11.414l-2.293 2.293a1 1 0 0 1-1.414-1.414L8.586 10 6.293 7.707a1 1 0 0 1 1.414-1.414L10 8.586l2.293-2.293a1 1 0 0 1 1.414 1.414L11.414 10l2.293 2.293Z"/>
      </svg>
      <span class="sr-only">Error icon</span>
    </div>

    <!-- Info Icon -->
    <div *ngIf="toast.type === 'info'" class="inline-flex items-center justify-center flex-shrink-0 w-10 h-10 text-blue-500 bg-blue-50 rounded-lg group-hover:bg-blue-100 transition-colors">
      <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9 5a1 1 0 1 1 2 0v1a1 1 0 0 1-2 0V5Zm2 10a1 1 0 0 1-2 0v-4a1 1 0 0 1 2 0v4Z"/>
      </svg>
      <span class="sr-only">Info icon</span>
    </div>

    <!-- Warning Icon -->
    <div *ngIf="toast.type === 'warning'" class="inline-flex items-center justify-center flex-shrink-0 w-10 h-10 text-orange-500 bg-orange-50 rounded-lg group-hover:bg-orange-100 transition-colors">
      <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM10 7a1 1 0 0 1 1 1v3a1 1 0 1 1-2 0V8a1 1 0 0 1 1-1Zm0 9a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"/>
      </svg>
      <span class="sr-only">Warning icon</span>
    </div>

    <div class="ml-3 text-sm font-medium text-gray-800">{{ toast.message }}</div>
    
    <button type="button" 
            (click)="removeToast(toast.id)"
            class="ml-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex items-center justify-center h-8 w-8 transition-all" 
            aria-label="Close">
      <span class="sr-only">Close</span>
      <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
      </svg>
    </button>
  </div>
</div>
