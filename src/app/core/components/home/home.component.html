

<section class="w-full flex-1">
    <div class="mb-4 bg-white rounded border border-gray-200 p-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div class="flex items-center gap-4">
            <img src="assets/images/logo.png" alt="Seller" class="w-20 h-20 object-contain bg-gray-100 rounded" />
            <h2 class="text-xl md:text-3xl font-bold text-gray-900">Want to be a Seller?</h2>
        </div>
        <a
            routerLink="/seller-screen"
            class="inline-flex items-center justify-center px-5 py-3 rounded-xl border border-blue-500 text-blue-600 font-semibold hover:bg-blue-50 transition"
        >
            Register Now As a Seller
        </a>
    </div>
    <app-carousel [slideImages]="images"></app-carousel>
    <article class="mb-5">
        <h3 class="text-2xl font-semibold mb-5">NEW ARRIVALS</h3>

        <div class="flex justify-center items-center h-[60vh]" *ngIf="error && isLoading">
            <div class="text-red-500 flex flex-col justify-center items-center">
              <i class="fa-solid fa-circle-exclamation text-6xl"></i>
            <h4 class="text-md px-4 py-2">HTTP ERROR Occured</h4>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-6 gap-5" *ngIf="!error && isLoading">
            <app-cardskeleton
            *ngFor="let skeleton of skeletons"
            ></app-cardskeleton>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-6 gap-5" *ngIf="!isLoading && products.length>0">
            <div *ngFor="let product of products" class="relative flex flex-col w-full max-w-md bg-white hover:border border-gray-300 rounded shadow-sm hover:shadow-md transition-shadow">
                <!-- Product Image -->
                <a [routerLink]="['categories','product',product.id]" class="w-full h-48 overflow-hidden bg-gray-100 flex items-center justify-center">
                    <img 
                    class="transition-all duration-500 hover:scale-110 w-full h-full object-cover"
                    [src]="product.images[0]" 
                    [alt]="product.title"
                    onerror="this.src='assets/images/logo.png'" />
                </a>
                
                <!-- Product Info -->
                <div class="flex flex-col p-4 flex-grow">
                    <!-- Category Badge -->
                    <div class="mb-2">
                        <span class="inline-block bg-green-600 text-white text-xs px-2 py-1 rounded">
                            {{product.category || 'Product'}}
                        </span>
                    </div>
                    
                    <!-- Product Name -->
                    <a [routerLink]="['categories','product',product.id]">
                        <h5 class="mb-2 text-sm font-semibold tracking-tight text-gray-900 dark:text-white line-clamp-2 hover:text-blue-600">
                            {{product.title}}
                        </h5>
                    </a>
                    
                    <!-- Item Code -->
                    <p class="text-xs text-gray-500 mb-2" *ngIf="product.item_code">
                        Code: <span class="font-mono">{{product.item_code}}</span>
                    </p>
                    
                    <!-- Price -->
                    <p class="text-sm text-gray-700 dark:text-gray-400 mb-3">
                       <span class="font-bold mr-2 text-lg">&#8377;{{product.price}}</span> 
                       <span class="line-through text-xs" *ngIf="product.prevprice > 0">&#8377;{{product.prevprice}}</span> 
                    </p>

                    <button 
                    *ngIf="isProductInCart(product); else addtocart"
                    class="px-4 py-2 bg-red-700 text-gray-200 w-full rounded mb-3"
                    aria-label="Remove from Cart"
                    (click)="removeFromCart(product)"
                    >
                        <i class="fa-solid fa-trash mr-2"></i>
                        Remove
                    </button>

                    <ng-template #addtocart>
                        <button 
                        class="px-4 py-2 bg-gray-800 text-gray-200 w-full rounded mb-3"
                        aria-label="Add to Cart"
                        (click)="addToCart(product)"
                        *ngIf="product.stock=='In stock'"
                        >
                            <i title="Shopping Cart" class="fa-solid fa-bag-shopping mr-2"></i>
                            Add to Cart
                        </button>

                        <div 
                        class="px-4 py-2 bg-yellow-600 text-center text-gray-200 w-full cursor-not-allowed rounded mb-3"
                        aria-label="Available soon"
                        *ngIf="product.stock=='Out of stock'"
                        >Available soon
                        </div>
                    </ng-template>

                    <!-- Stock & Wishlist -->
                    <div class="flex justify-between items-center mt-auto">
                        <span *ngIf="product.stock=='In stock'; else outofstock" class="bg-green-600 text-white text-center text-xs px-2 py-1 rounded">
                            {{product.stock}}
                        </span>
                        <ng-template #outofstock>
                            <span class="bg-yellow-600 text-white text-center text-xs px-2 py-1 rounded" >
                            {{product.stock}}
                            </span>
                        </ng-template>
                        
                        <button 
                        aria-label="add to wishlist"
                        class="bg-white border border-gray-300 rounded h-[35px] w-[35px] hover:bg-gray-100"
                        title="Add to Wishlist"
                        >
                            <i class="fa-regular fa-heart"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </article>
</section>
