
<div class="mt-10 mb-10 p-8 max-w-[480px] mx-auto bg-white dark:bg-gray-800 shadow-2xl rounded-2xl border border-gray-100 dark:border-gray-700 transition-all duration-300">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">Welcome Back</h2>
        <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">Sign in to continue your shopping</p>
    </div>

    <!-- Error Message Display -->
    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 rounded-xl text-sm font-medium animate-pulse">
        <i class="fas fa-exclamation-circle mr-2"></i> {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
            <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-200 mb-2">Email or Username</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                    <i class="fas fa-user text-xs"></i>
                </div>
                <input 
                    type="text" 
                    id="email" 
                    formControlName="email"
                    class="block w-full pl-10 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-gray-400 dark:placeholder:text-gray-500" 
                    placeholder="administrator or email@domain.com" required>
            </div>
        </div>

        <div>
            <div class="flex justify-between items-center mb-2">
                <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-200">Password</label>
                <a href="#" class="text-xs font-bold text-blue-600 hover:text-blue-700 dark:text-blue-400 hover:underline transition-all">Forgot?</a>
            </div>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                    <i class="fas fa-lock text-xs"></i>
                </div>
                <input 
                    type="password" 
                    id="password" 
                    formControlName="password"
                    class="block w-full pl-10 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-gray-400 dark:placeholder:text-gray-500" 
                    placeholder="••••••••" required>
            </div>
        </div>
        
        <button 
            type="submit" 
            [disabled]="isLoading"
            class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200 transform hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
            {{ isLoading ? 'Signing in...' : 'Sign In' }}
        </button>

        <p class="text-center text-sm text-gray-600 dark:text-gray-400 mt-6">
            Not a member? 
            <a [routerLink]="['/register']" class="font-bold text-blue-600 hover:text-blue-700 dark:text-blue-400 hover:underline transition-all">Create Account</a>
        </p>
    </form>
</div>
