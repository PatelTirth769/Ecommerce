<section class="seller-screen-wrapper">
  <div class="seller-top-bar">
    <a routerLink="/" class="brand-wrap">
      <img src="assets/images/logo.png" alt="Sale24x7" class="brand-logo" />
    </a>

    <h1 class="headline">Want to be a Seller?</h1>

    <a routerLink="/register-seller" class="register-btn">Register Now As a Seller</a>
  </div>

  <div class="hero-carousel">
    <button class="nav prev" type="button" (click)="prevSlide()" aria-label="Previous">&#10094;</button>

    <img
      [src]="heroSlides[currentSlide]"
      class="hero-image"
      alt="Seller information"
      loading="lazy"
    />

    <button class="nav next" type="button" (click)="nextSlide()" aria-label="Next">&#10095;</button>
  </div>

  <div class="indicators">
    <button
      type="button"
      *ngFor="let slide of heroSlides; let i = index"
      [class.active]="i === currentSlide"
      (click)="goToSlide(i)"
      [attr.aria-label]="'Go to slide ' + (i + 1)"
    ></button>
  </div>
</section>
