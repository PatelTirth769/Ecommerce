<div class="relative flex flex-col w-full max-w-md bg-white hover:border border-gray-300 rounded shadow-sm hover:shadow-md transition-shadow">
        <a [routerLink]="['/categories','product',product.id]" class="w-full h-48 overflow-hidden bg-gray-100 flex items-center justify-center">
            <img 
            [ngClass]="{'transition-all duration-500 hover:scale-110 grayscale':product.stock=='Out of stock',
            'transition-all duration-500 hover:scale-110':product.stock=='In stock'}" 
            class="w-full h-full object-cover"
            [src]="product.images[0]" 
            [alt]="product.title"
            onerror="this.src='assets/images/logo.png'" />
        </a>
        
        <div class="flex flex-col justify-stretch p-4 flex-grow">
            <!-- Category Badge -->
            <div class="mb-2">
                <span class="inline-block bg-green-600 text-white text-xs px-2 py-1 rounded">
                    {{product.category || 'Product'}}
                </span>
            </div>
            
            <a [routerLink]="['/categories','product',product.id]">
                <h5 class="mb-2 font-semibold text-sm tracking-tight text-gray-900 dark:text-white line-clamp-2 hover:text-blue-600">{{product.title}}</h5>
            </a>
            
            <!-- Item Code -->
            <p class="text-xs text-gray-500 mb-2" *ngIf="product.item_code">
                Code: <span class="font-mono">{{product.item_code}}</span>
            </p>
            
            <p class="text-sm text-gray-700 dark:text-gray-400 mb-2">
               <span class="font-bold mr-2">&#8377;{{product.price}}</span> 
               <span class="line-through text-xs" *ngIf="product.prevprice!=0">&#8377;{{product.prevprice}}</span> 
               <span class="text-xs font-bold text-red-700" *ngIf="product.prevprice!==0">(-{{discount}}%)</span> 
            </p>
            
            <p class="flex items-center mb-3">
                <span class="mr-1.5">{{product.rating.rate}}</span>
                <span *ngFor="let ratestar of ratingList">
                    <i class="fa-solid fa-star" *ngIf="ratestar"></i>
                  </span>
                  <span *ngFor="let ratestar of ratingList">
                    <i class="fa-regular fa-star" *ngIf="!ratestar" ></i>
                  </span>
                <span class="ml-2 text-xs">({{product.rating.count}})</span>
            </p>
            
            <button 
            *ngIf="isProductInCart(product); else addtocart"
            class="px-4 py-1 bg-red-700 text-gray-200 w-full rounded"
            aria-label="Remove from Cart"
            (click)="removeFromCart(product)"
            >
            <i class="fa-solid fa-trash mr-2"></i>
            Remove
            </button>

            <ng-template #addtocart>
                <button 
                class="px-4 py-1 bg-gray-800 text-gray-200 w-full rounded"
                aria-label="Add to Cart"
                (click)="addToCart(product)"
                *ngIf="product.stock=='In stock'"
                >
                    <i title="Shopping Cart" class="fa-solid fa-bag-shopping mr-2"></i>
                    Add
                </button>

                <div 
                class="px-4 py-1 bg-yellow-600 text-center text-gray-200 w-full cursor-not-allowed"
                disabled
                aria-label="Available soon"
                *ngIf="product.stock=='Out of stock'"
                >Available soon
                </div>

            </ng-template>
            

            <div class="absolute top-2 left-5 md:right-5 flex justify-end gap-4 items-center">
                <span *ngIf="product.stock=='In stock'; else outofstock" class="w-[80px] bg-green-600 text-white text-center text-xs p-1 rounded">
                    {{product.stock}}
                </span>
                <ng-template #outofstock>
                    <span class="w-[80px] bg-yellow-600 text-white text-center text-xs p-1 rounded" >
                    {{product.stock}}
                    </span>
                </ng-template>
                
                <button 
                aria-label="add to wishlist"
                class="bg-white border border-gray-300 rounded h-[35px] w-[35px]"
                title="Add to Wishlist"
                >
                    <i class="fa-regular fa-heart"></i>
                </button>
            </div>
            
        </div>
</div>
